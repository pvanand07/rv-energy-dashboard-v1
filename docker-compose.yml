# ─────────────────────────────────────────────────────────────────────────────
# RV Energy Intelligence — Docker Compose
#
# Usage:
#   docker compose up -d            # start detached
#   docker compose down             # stop
#   docker compose logs -f          # follow logs
#   docker compose up --build -d    # rebuild and restart (after git pull)
# ─────────────────────────────────────────────────────────────────────────────

services:
  rv-energy:
    build: .
    container_name: rv-energy
    restart: unless-stopped
    ports:
      - "20024:5000"
    volumes:
      # Mount source so git pull inside the container triggers uvicorn --reload
      - .:/app
      # Named volume keeps SQLite data separate from source mount
      - rv_data:/app/data
    environment:
      DB_PATH: /app/data/rv_energy.db
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rv_data:
